<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат с Mistral (Бесплатно)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body { background: #0f0f0f; color: #e0e0e0; font-family: system-ui, sans-serif; }
#messages { scrollbar-width: thin; scrollbar-color: #444 #1a1a1a; }
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
.msg-user { background: #2563eb; color: white; align-self: flex-end; max-width: 85%; }
.msg-ai   { background: #374151; align-self: flex-start; max-width: 90%; }
.fade-in { animation: fadeIn 0.4s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
textarea { resize: none; }
button:active { transform: scale(0.96); }
</style>
</head>
<body class="flex flex-col h-screen">

<header class="bg-gray-900 p-4 border-b border-gray-700 flex justify-between items-center">
<h1 class="text-xl font-bold">Чат с Mistral</h1>
<div class="flex gap-4">
  <button id="clear" class="text-red-400 hover:text-red-300 text-sm"><i class="fas fa-trash-alt"></i> Очистить</button>
</div>
</header>

<div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col"></div>

<div class="bg-gray-900 border-t border-gray-700 p-4">
<div class="flex gap-2 max-w-4xl mx-auto">
  <textarea id="input" rows="1" placeholder="Напиши сообщение..." 
            class="flex-1 bg-gray-800 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500"></textarea>
  <button id="send" class="w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center text-white">
    <i class="fas fa-paper-plane"></i>
  </button>
  <button id="voice" class="w-12 h-12 bg-gray-700 rounded-lg flex items-center justify-center text-white">
    <i class="fas fa-microphone"></i>
  </button>
</div>
<div id="status" class="text-center text-sm text-gray-400 mt-2">готов</div>
</div>

<script>
// === Бесплатный Mistral Demo API ===
const MISTRAL_DEMO_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0"; 

let messages = JSON.parse(localStorage.getItem('chat_history') || '[]');

function addMsg(role, text) {
  messages.push({ role, text });
  localStorage.setItem('chat_history', JSON.stringify(messages));

  const div = document.createElement('div');
  div.className = `p-4 rounded-xl fade-in ${role==='user'?'msg-user':'msg-ai'}`;
  div.innerHTML = text.replace(/\n/g,'<br>');
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 999999;
}

// === Отправка запроса в Mistral ===
async function askAI(text) {
  addMsg('user', text);
  document.getElementById('status').textContent = "Mistral думает...";

  try {
    const res = await fetch(MISTRAL_DEMO_URL, {
      method:'POST',
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer hf_demo" // публичный демо-токен Hugging Face
      },
      body: JSON.stringify({ inputs: text })
    });

    if(!res.ok){
      const err = await res.text();
      throw new Error(`Mistral ошибка: ${res.status} — ${err}`);
    }

    const data = await res.json();
    const reply = data?.generated_text || data?.[0]?.generated_text || "Нет ответа от Mistral";
    addMsg('assistant', reply);

  } catch(err){
    console.error(err);
    addMsg('assistant', `Ошибка:\n${err.message}\n\nВозможные причины:\n1. Проблемы с интернетом\n2. Ограничение на бесплатный demo API`);
  } finally {
    document.getElementById('status').textContent = 'готов';
  }
}

// === События ===
document.getElementById('send').onclick = () => {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(text){
    askAI(text);
    input.value='';
  }
};

document.getElementById('input').onkeydown = e => {
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('send').click();
  }
};

document.getElementById('voice').onclick = () => {
  if(!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)){
    alert('Голосовой ввод не поддерживается');
    return;
  }

  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang='ru-RU';
  rec.onresult = e=>{
    const text = e.results[0][0].transcript;
    document.getElementById('input').value = text;
    document.getElementById('send').click();
  };
  rec.onerror = ()=>alert('Ошибка голосового ввода');
  rec.start();
};

document.getElementById('clear').onclick = () => {
  if(confirm('Очистить чат?')){
    messages=[];
    localStorage.removeItem('chat_history');
    document.getElementById('messages').innerHTML='';
  }
};

// Загрузка истории
messages.forEach(m=>addMsg(m.role, m.text));
</script>
</body>
</html>
