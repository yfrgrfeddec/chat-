<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Матрица — Groq + Gemini</title>
<style>
  :root {
    --bg: #000;
    --text: #e0ffe0;
    --accent: #00ff9d;
    --panel: rgba(10, 26, 10, 0.98);
  }
  .light {
    --bg: #f8fff8;
    --text: #1a2a1a;
    --accent: #006633;
    --panel: rgba(255,255,255,0.98);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui, sans-serif;
    display:flex;
    overflow:hidden;
    transition: background 0.4s, color 0.4s;
  }
  #sidebar {
    position:fixed;
    left:0;
    top:0;
    width:280px;
    height:100%;
    background:var(--panel);
    border-right:1px solid rgba(0,255,157,0.15);
    overflow-y:auto;
    padding:16px;
    transform:translateX(-100%);
    transition: transform 0.3s ease;
    z-index:100;
  }
  #sidebar.open { transform:translateX(0); }
  #sidebarToggle {
    position:fixed;
    left:16px;
    top:16px;
    z-index:101;
    background:var(--accent);
    color:#000;
    border:none;
    padding:12px 16px;
    border-radius:12px;
    cursor:pointer;
    font-size:1.2rem;
    font-weight:600;
  }
  #header {
    padding:12px 16px;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid rgba(0,255,157,0.15);
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  #apiSwitcher {
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .api-btn {
    padding:8px 14px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    font-weight:600;
    font-size:0.9rem;
    transition: all 0.2s;
  }
  .api-btn.active { background:var(--accent); color:#000; }
  .api-btn.inactive { background:#444; color:#888; cursor:not-allowed; }
  #newChat {
    background:var(--accent);
    color:#000;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
  }
  .chat-item {
    padding:12px 14px;
    border-radius:10px;
    cursor:pointer;
    background:rgba(0,255,157,0.05);
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .chat-item:hover { background:rgba(0,255,157,0.15); }
  .chat-item.active { background:rgba(0,255,157,0.3); font-weight:600; }
  .chat-item .title { flex:1; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-item .delete {
    background:none;
    border:none;
    color:#ff3366;
    font-size:1.3rem;
    cursor:pointer;
    padding:0 8px;
  }
  #main {
    flex:1;
    display:flex;
    flex-direction:column;
  }
  #chatHeader {
    padding:12px 16px;
    background:rgba(0,0,0,0.9);
    border-bottom:1px solid rgba(0,255,157,0.15);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:600;
  }
  #content {
    flex:1;
    padding:16px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .msg {
    max-width:88%;
    padding:12px 18px;
    border-radius:18px;
    line-height:1.45;
  }
  .user {
    align-self:flex-end;
    background:rgba(0,90,45,0.8);
    border:1px solid rgba(0,255,157,0.3);
  }
  .ai {
    align-self:flex-start;
    background:rgba(0,40,25,0.85);
    border:1px solid rgba(0,255,157,0.2);
  }
  img {
    max-width:90%;
    border-radius:12px;
    margin:8px 0;
    box-shadow:0 4px 16px rgba(0,255,157,0.2);
  }
  footer {
    padding:12px 16px;
    background:var(--panel);
    border-top:1px solid rgba(0,255,157,0.15);
    display:flex;
    gap:12px;
    align-items:center;
  }
  #attach, #voiceBtn {
    background:none;
    border:none;
    color:var(--accent);
    font-size:2.2rem;
    cursor:pointer;
    padding:8px;
  }
  #input-wrap {
    flex:1;
    position:relative;
  }
  #input {
    width:100%;
    padding:14px 70px 14px 16px;
    font-size:1.05rem;
    border-radius:20px;
    background:#0a0a0a;
    color:var(--text);
    border:1px solid rgba(0,255,157,0.3);
    resize:none;
    min-height:52px;
    max-height:160px;
    outline:none;
  }
  #input:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(0,255,157,0.25);
  }
  #send {
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:var(--accent);
    font-size:1.9rem;
    cursor:pointer;
    padding:8px;
  }
  #typing {
    opacity:0.6;
    font-style:italic;
    padding:8px 16px;
  }
</style>
</head>
<body>
<button id="sidebarToggle">☰</button>

<div id="sidebar">
  <div id="header">
    <h1>Матрица</h1>
    <button id="newChat">+ Новый</button>
  </div>
  <div id="chatsList"></div>
</div>

<div id="main">
  <div id="chatHeader">
    Матрица
    <div id="apiSwitcher">
      <button class="api-btn active" data-api="groq">Groq</button>
      <button class="api-btn" data-api="gemini">Gemini</button>
    </div>
    <div>
      <button id="themeBtn">🌙</button>
      <button id="clearChat">Очистить</button>
    </div>
  </div>
  <main id="content"></main>
  <footer>
    <label id="attach" for="file">📎</label>
    <input type="file" id="file" accept="image/*" hidden>
    <button id="voiceBtn">🎤</button>
    <div id="input-wrap">
      <textarea id="input" placeholder="Пиши или говори..." rows="1"></textarea>
      <button id="send">➤</button>
    </div>
  </footer>
</div>

<div id="typing"></div>

<script>
// Ключи API
const API_KEYS = {
  groq: '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',
  gemini: 'AIzaSyCDXRU7c9XP2ZxREWeZeS41Alt2ESXRDRk'
};

const API_CONFIG = {
  groq: {
    url: 'https://api.groq.com/openai/v1/chat/completions',
    model: 'llama-3.3-70b-versatile'
  },
  gemini: {
    url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',
    model: 'gemini-1.5-flash'
  }
};

let conversations = JSON.parse(localStorage.getItem('matrixChats') || '[]');
let currentChatId = localStorage.getItem('currentChatId') || null;
let currentAPI = localStorage.getItem('currentAPI') || 'groq';
let isDark = localStorage.getItem('theme') !== 'light';

if (conversations.length === 0) createNewChat();

// Переключение API
function initApiSwitcher() {
  const buttons = document.querySelectorAll('.api-btn');
  buttons.forEach(btn => {
    const api = btn.dataset.api;
    if (API_KEYS[api]) {
      btn.classList.remove('inactive');
      btn.classList.toggle('active', api === currentAPI);
      btn.onclick = () => {
        currentAPI = api;
        localStorage.setItem('currentAPI', api);
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
    }
  });
}

// Запрос к API
async function ask(text) {
  const api = currentAPI;
  const config = API_CONFIG[api];
  const key = API_KEYS[api];

  const chat = conversations.find(c => c.id === currentChatId);
  if (!chat) return 'Ошибка чата';

  const messages = [
    { role: 'system', content: 'Ты Grok. Отвечай прямо, честно, с юмором, иногда матом. Без воды. По делу.' },
    ...chat.messages.slice(-6),
    { role: 'user', content: text }
  ];

  document.getElementById('typing').textContent = 'печатает...';

  try {
    if (api === 'groq') {
      const res = await fetch(config.url, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${key}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: config.model,
          messages,
          temperature: 0.8,
          max_tokens: 500
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      document.getElementById('typing').textContent = '';
      return data.choices[0].message.content.trim();
    } else if (api === 'gemini') {
      const res = await fetch(`\( {config.url}?key= \){key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            role: "user",
            parts: [{ text }]
          }],
          generationConfig: {
            temperature: 0.8,
            topK: 40,
            topP: 0.95,
            maxOutputTokens: 500,
            candidateCount: 1
          }
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} от Gemini`);
      const data = await res.json();
      document.getElementById('typing').textContent = '';
      return data.candidates[0].content.parts[0].text.trim();
    }
  } catch (e) {
    document.getElementById('typing').textContent = '';
    return `Ошибка ${api}: ${e.message}. Попробуй другой API.`;
  }
}

// Создание нового чата
function createNewChat() {
  const id = Date.now().toString();
  const newChat = { id, title: 'Новый разговор', messages: [] };
  conversations.push(newChat);
  currentChatId = id;
  saveAll();
  renderChatsList();
  loadChat(id);
}

// Сохранение
function saveAll() {
  localStorage.setItem('matrixChats', JSON.stringify(conversations));
  localStorage.setItem('currentChatId', currentChatId);
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

// Рендер списка чатов
function renderChatsList() {
  const list = document.getElementById('chatsList');
  list.innerHTML = '';
  conversations.forEach(chat => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
    item.innerHTML = `
      <div class="title">${chat.title}</div>
      <button class="delete">×</button>
    `;
    item.onclick = e => {
      if (e.target.classList.contains('delete')) {
        if (confirm('Удалить чат?')) deleteChat(chat.id);
      } else {
        switchChat(chat.id);
      }
    };
    item.ondblclick = () => renameChat(chat.id);
    list.appendChild(item);
  });
}

// Переключение чата
function switchChat(id) {
  currentChatId = id;
  saveAll();
  renderChatsList();
  loadChat(id);
  document.getElementById('sidebar').classList.remove('open');
}

// Переименование чата
function renameChat(id) {
  const chat = conversations.find(c => c.id === id);
  if (!chat) return;
  const newTitle = prompt('Новое название чата:', chat.title);
  if (newTitle && newTitle.trim()) {
    chat.title = newTitle.trim();
    saveAll();
    renderChatsList();
  }
}

// Удаление чата
function deleteChat(id) {
  conversations = conversations.filter(c => c.id !== id);
  if (currentChatId === id) {
    if (conversations.length > 0) currentChatId = conversations[0].id;
    else createNewChat();
  }
  saveAll();
  renderChatsList();
  loadChat(currentChatId);
}

// Загрузка чата
function loadChat(id) {
  const chat = conversations.find(c => c.id === id);
  if (!chat) return;
  document.getElementById('chatHeader').firstChild.textContent = chat.title;
  const content = document.getElementById('content');
  content.innerHTML = '';
  chat.messages.forEach(msg => {
    add(msg.role, msg.content, msg.isImage);
  });
}

// Добавление сообщения
function add(role, content, isImage = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (isImage) {
    const img = document.createElement('img');
    img.src = content;
    img.style.maxWidth = '280px';
    div.appendChild(img);
  } else {
    div.textContent = content;
  }
  document.getElementById('content').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// Отправка
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  add('user', text);
  input.value = '';
  input.focus();

  const reply = await ask(text);
  add('ai', reply);

  const chat = conversations.find(c => c.id === currentChatId);
  if (chat) {
    chat.messages.push({ role: 'user', content: text });
    chat.messages.push({ role: 'assistant', content: reply });
    saveAll();
  }
}

// Голосовой ввод
document.getElementById('voiceBtn').onclick = () => {
  if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
    alert('Голосовой ввод не поддерживается');
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SpeechRecognition();
  rec.lang = 'ru-RU';
  rec.interimResults = false;
  rec.onresult = e => {
    document.getElementById('input').value += e.results[0][0].transcript + ' ';
  };
  rec.start();
};

// Тема
document.getElementById('themeBtn').onclick = () => {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  saveAll();
};

// События
document.getElementById('input').addEventListener('keypress', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

document.getElementById('send').addEventListener('click', send);

document.getElementById('newChat').addEventListener('click', createNewChat);

document.getElementById('attach').onclick = () => document.getElementById('file').click();

document.getElementById('file').onchange = e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => add('user', ev.target.result, true);
    reader.readAsDataURL(file);
  }
};

document.getElementById('sidebarToggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
};

document.getElementById('clearChat').onclick = () => {
  if (confirm('Очистить текущий чат?')) {
    const chat = conversations.find(c => c.id === currentChatId);
    if (chat) {
      chat.messages = [];
      saveAll();
      loadChat(currentChatId);
    }
  }
};

// Инициализация
initApiSwitcher();
renderChatsList();
if (currentChatId) loadChat(currentChatId);
else createNewChat();
document.body.classList.toggle('light', !isDark);
document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
</script>
</body>
</html>
